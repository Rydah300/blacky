<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Black Oracle Shop | Forgot Password</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <div class="main-content">
    <header>
      <div class="logo">
        <i class="fas fa-mask"></i>
        BLACK ORACLE SHOP
      </div>
    </header>
    
    <div class="card">
      <h2 class="card-title">Password Recovery</h2>
      
      <form id="forgot-form" action="#">
        <div class="form-group">
          <label for="reset-username">Username</label>
          <input type="text" id="reset-username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" placeholder="Enter your email address" required>
        </div>
        
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>
        
        <button type="submit" class="btn btn-primary">SEND RESET LINK</button>
      </form>
      
      <div style="margin-top: 20px; text-align: center;">
        <a href="index.html" class="btn-link">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    // Handle form submission
    document.getElementById('forgot-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // In a real implementation, you would send a reset link to the email
      // For this demo, we'll just show a success message
      alert('Password reset link sent to your email!');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
